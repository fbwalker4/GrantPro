<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Grant Pro</title>
    <link rel="icon" type="image/png" href="/static/images/gp_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fc;
            color: #1a1f36;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 100%;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .check-icon {
            width: 64px;
            height: 64px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .check-icon svg {
            width: 32px;
            height: 32px;
            stroke: #059669;
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        p {
            color: #5e6278;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .btn-home {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: box-shadow 0.2s;
        }
        .btn-home:hover {
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>Thank You{% if org_name %}, {{ org_name }}{% endif %}!</h1>
        <p>Your testimonial has been submitted and will be reviewed shortly. We appreciate you sharing your experience with Grant Pro.</p>
        <a href="/" class="btn-home">Visit GrantPro.org</a>
    </div>
</body>
</html>
