{% extends "layout.html" %}

{% block title %}{{ title }} - Grant Pro{% endblock %}

{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card" style="max-width: 560px; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 1rem;" aria-hidden="true">{{ icon }}</div>
        <h1 style="margin-bottom: 1rem;">{{ title }}</h1>
        <p style="color: var(--text-secondary); margin-bottom: 1.25rem;" role="status">{{ message }}</p>
        {% if error_id %}
        <div style="background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.18); border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 1.25rem; text-align: left;">
            <div style="font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 0.35rem;">Error reference</div>
            <div style="display:flex; gap:0.75rem; align-items:center; justify-content:space-between; flex-wrap:wrap;">
                <code style="font-size: 0.95rem;">{{ error_id }}</code>
                <button type="button" class="btn btn-secondary" onclick="navigator.clipboard.writeText('{{ error_id }}')">Copy reference</button>
            </div>
        </div>
        {% endif %}
        <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
            <a href="{{ retry_url or '/' }}" class="btn btn-primary">Go back</a>
            <a href="/" class="btn btn-secondary">Go to Homepage</a>
            {% if support_email %}
            <a href="mailto:{{ support_email }}?subject=GrantPro%20error%20{{ error_id or '' }}" class="btn btn-secondary">Email support</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
