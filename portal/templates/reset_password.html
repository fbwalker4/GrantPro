<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Grant Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --accent: #f59e0b;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --error: #ef4444;
            --success: #10b981;
        }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .container { background: var(--white); border-radius: 16px; padding: 2.5rem; max-width: 420px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo a { font-size: 1.75rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; color: var(--dark); }
        .subtitle { text-align: center; color: var(--gray); margin-bottom: 2rem; font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 500; margin-bottom: 0.5rem; color: var(--dark); font-size: 0.9rem; }
        input[type="email"], input[type="password"] { width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); }
        .btn { display: block; width: 100%; padding: 0.875rem; background: var(--primary); color: var(--white); border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn:hover { background: var(--primary-dark); }
        .message { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; }
        .message.success { background: #dcfce7; color: #166534; }
        .message.error { background: #fee2e2; color: #991b1b; }
        .links { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--gray); }
        .links a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><a href="/">Grant Pro</a></div>
        
        {% if message %}
        <div class="message {{ message_type }}" role="status">{{ message }}</div>
        {% endif %}
        
        {% if not reset_complete %}
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below.</p>
        
        <form method="POST" action="/reset-password/{{ token }}" role="form" aria-label="Set new password">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required aria-required="true" minlength="8" placeholder="At least 8 characters">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required aria-required="true" placeholder="Confirm your password">
            </div>
            
            <button type="submit" class="btn">Reset Password</button>
        </form>
        {% else %}
        <div class="message success">Your password has been reset successfully.</div>
        <div class="links">
            <a href="/login">Sign In with New Password</a>
        </div>
        {% endif %}
        
        <div class="links">
            <a href="/login">Back to Sign In</a>
        </div>
    </div>
</body>
</html>
